name: Run tests
run-name: Run frontend tests ${{github.repository}}
on:
  push:
    branches:
      - main
jobs:
  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        working-directory: ./frontend
        run: npm install

      - name: Run tests and capture output
        id: run-tests
        working-directory: ./frontend
        continue-on-error: true
        run: |
          set +e
          OUTPUT=$(npm test --silent 2>&1)
          EXIT_CODE=$?
          set -e
          {
            echo 'JSON_RESPONSE<<EOF'
            echo "$OUTPUT"
            echo 'EOF'
            echo "EXIT_CODE=$EXIT_CODE"
          } >> "$GITHUB_OUTPUT"

      - name: Upload test result
        continue-on-error: true
        run: |
          echo "The response length is: ${{steps.run-tests.outputs.JSON_RESPONSE}}"
        # env: OUTPUT:${{steps.run-tests.outputs.JSON_RESPONSE}}
