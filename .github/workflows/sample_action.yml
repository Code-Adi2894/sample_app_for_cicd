name: Run tests
run-name: Run frontend tests ${{github.repository}}
on:
  push:
    branches:
      - main
jobs:
  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        working-directory: ./frontend
        run: npm install

      - name: Run tests and capture output
        id: run-tests
        working-directory: ./frontend
        run: |
          my_key=$(npm run test)
          echo "myKey=$myKey" >> $GITHUB_OUTPUT

      - name: Upload test result
        run: echo "The previous step output is ${{steps.run-tests.outputs.my_key}}"
