name: Run tests
run-name: Run frontend tests ${{github.repository}}
on:
  push:
    branches:
      - main
jobs:
  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        working-directory: ./frontend
        run: npm install

      - name: Run tests and capture output
        id: run-tests
        working-directory: ./frontend
        # run: |
        # RESULT = ${
        #   echo 'CONTENT<<EOF'
        #   npm run test
        #   echo EOF
        #   }
        # # Base64 encode
        # RESULT_ENCODED = $(echo -n "$RESULT" | base64)
        # # Output the base encoded string
        # echo "result=$RESULT_ENCODED" >> GITHUB_OUTPUT
        run: |
          OUTPUT=$(npm test --silent 2>&1)

          {
            echo 'JSON_RESPONSE<<EOF'
            echo "$OUTPUT"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Upload test result
        run: |
          echo "The response length is: ${{steps.run-tests.outputs.JSON_RESPONSE}}"
        # env: OUTPUT:${{steps.run-tests.outputs.JSON_RESPONSE}}
