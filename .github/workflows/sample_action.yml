name: Run tests
run-name: Run frontend tests ${{github.repository}}
on:
  push:
    branches:
      - main
  issues:
    types: opened
jobs:
  test-frontend:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      models: read
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        working-directory: ./frontend
        run: npm install

      - name: Install Github Copilot CLI
        run: npm install -g @github/copilot

      - name: Authenticate Copilot
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: copilot -p "Explain the code in this repository"

      # - name: Run frontend tests
      #   working-directory: ./frontend
      #   run: copilot -p "What is the name of the project?"

      - name: Run tests and capture output
        id: run-tests
        working-directory: ./frontend
        continue-on-error: true
        run: |
          set +e
          OUTPUT=$(npm test --silent 2>&1)
          EXIT_CODE=$?
          set -e
          {
            echo 'JSON_RESPONSE<<EOF'
            echo "$OUTPUT"
            echo 'EOF'
            echo "EXIT_CODE=$EXIT_CODE"
          } >> "$GITHUB_OUTPUT"

      - name: Upload test result
        continue-on-error: true
        run: |
          echo ${{steps.run-tests.outputs.JSON_RESPONSE}}

      - name: Run AI inference
        id: inference
        uses: actions/ai-inference@v1
        with:
          prompt: |
            I am providing you the test console output of Jest runner. I want you to summarize the issue of the failed tests. only summarize it in one short paragraph. This is the output: ${{steps.run-tests.outputs.JSON_RESPONSE}}

      - name: Create issues
        run: gh issue create --title "Automated issue " --body "$RESPONSE"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RESPONSE: ${{ steps.inference.outputs.response }}
