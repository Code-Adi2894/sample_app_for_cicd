name: Run tests
run-name: Run frontend tests ${{github.repository}}
on:
  push:
    branches:
      - main
jobs:
  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        working-directory: ./frontend
        run: npm install

      - name: Run tests and capture output
        id: run-tests
        working-directory: ./frontend
        run: |
          set -o pipefail
          npm test 2>&1 | tee test-output.log

      - name: Upload test logs
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: ./frontend/test-output.log

      - name: Interpret errors with GitHub Models
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const log = fs.readFileSync('./frontend/test-output.log', 'utf8');

            // Call GitHub Models (pseudo-code, adapt to your setup)
            const response = await github.request("POST /copilot/models", {
                data: {
                model: "gpt-4.1-mini",   // or whichever model you’ve enabled
                input: `Summarize this test failure in plain English:\n\n${log}`
                }
            });

            const summary = response.data.output;

            // Create an issue with the summary
            await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: "Frontend test failure",
                body: summary
            });
